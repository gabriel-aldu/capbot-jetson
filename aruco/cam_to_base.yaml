# cam_to_base.yaml (ejemplo)
# ---------------------------
# Transformada estatica entre el marco de la camara y el marco base_link del robot.
# Reemplaza al lookup TF del nodo ROS original.
#
# CONVENCION del marco de la camara (optical frame de OpenCV):
#   x -> derecha
#   y -> abajo
#   z -> adelante (hacia la escena)
#
# La matriz representa la POSE de base_link EXPRESADA en el marco de la camara.
# Es decir: si base_link esta 10 cm por debajo de la camara y alineado,
# entonces base_link visto desde la camara esta en (0, +0.10, 0) porque
# "abajo" es +y en optical frame.
#
# Traslacion en metros. Rotacion en radianes (roll, pitch, yaw = XYZ intrinsic).

translation: [0.0, 0.10, 0.0]
rotation_rpy: [0.0, 0.0, 0.0]

# Nota: medi estos valores con tu CAD o con una regla. Si no los conoces con
# certeza, deja identidad y trabaja con la pose de la camara. La diferencia
# es un offset constante que puedes descontar despues.
